name: omniscribe_ai
description: OmniScribe AI - cross-platform domain-aware dictation and voice assistant.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
  equatable: ^2.0.8
  http: ^1.1.0
  flutter_dotenv: ^5.0.2
  url_launcher: ^6.1.10
  record: ^5.0.5
  path_provider: ^2.1.3
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
