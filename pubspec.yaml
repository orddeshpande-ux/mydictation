name: omniscribe_ai
description: OmniScribe AI - cross-platform domain-aware dictation and voice assistant.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  http: ^1.1.0
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.1.10
  record: ^5.0.5
  path_provider: ^2.1.3
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.2
  supabase_flutter: ^2.5.4
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0+1
  google_fonts: 6.1.0
  permission_handler: ^11.0.1
  flutter_secure_storage: ^9.0.0
  speech_to_text_windows: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
